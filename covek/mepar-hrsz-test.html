<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MePAR HRSZ teszt – OpenLayers EPSG:23700</title>

    <!-- OpenLayers 8 (ugyanaz mint az eredeti MePAR app) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@8.2.0/ol.css" />
    <script src="https://cdn.jsdelivr.net/npm/ol@8.2.0/dist/ol.js"></script>

    <!-- proj4.js – EPSG:23700 regisztrációhoz -->
    <script src="https://unpkg.com/proj4@2.12.0/dist/proj4.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        #info {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 8px 12px;
            border-radius: 4px; font-family: monospace; font-size: 12px;
            max-width: 420px;
        }
    </style>
</head>
<body>
<div id="map"></div>
<div id="info">Betöltés...</div>

<script>
// ============================================================
// Paraméterek kizárólag a MePAR Angular bundle-ből (mepar/main.9a43fb7c78367b9a.js)
// ============================================================

// srsDef – bundle: srsDef:"+proj=somerc ..."
const EPSG23700_DEF =
    '+proj=somerc +lat_0=47.14439372222222 +lon_0=19.04857177777778' +
    ' +k_0=0.99993 +x_0=650000 +y_0=200000 +ellps=GRS67' +
    ' +towgs84=52.17,-71.82,-14.9,0,0,0,0 +units=m +no_defs';

// Resolutions – bundle: const P=[{resolution:1120,...},{resolution:560,...},...]
const RESOLUTIONS = [
    1120, 560, 280, 140,
    55.99999999, 27.9999999999, 13.9999999999,
    5.6, 2.8, 1.4, 0.559999999999,
    0.28, 0.14, 0.056, 0.028
];

// startExtent – bundle: S=[427130,40564,950289,374373]
const S = [427130, 40564, 950289, 374373];

// mapExtent – bundle: mapExtent:[S[0]-2e5,S[1]-2e5,S[2]+2e5,S[3]+2e5]
const MAP_EXTENT = [S[0]-200000, S[1]-200000, S[2]+200000, S[3]+200000];

// center – bundle: center:[2120172,6023409]  (EOV méterben)
const CENTER = [2120172, 6023409];

// WMS URL – bundle: const O="/api/proxy/iier-gs/wms" (relatív, teljes domain kell)
const WMS_URL = 'https://mepar.mvh.allamkincstar.gov.hu/api/proxy/iier-gs/wms';

// HRSZ VIEWPARAMS – bundle: `VONEV:${O};TOLDA:${v};IGDAT:${M}`
// Aktuális értékek (2025-ös kampányév, statikus VONEV_MAP alapján)
const VONEV_DATA = { vonev: '2026', tolda: '20260301', igdat: '20270228' };
const VIEWPARAMS = `VONEV:${VONEV_DATA.vonev};TOLDA:${VONEV_DATA.tolda};IGDAT:${VONEV_DATA.igdat}`;

// HRSZ maxResolution – bundle: maxResolution:P[3].resolution = 140
// (csak 1:500,000-nél nagyobb léptéken jelenik meg)
const HRSZ_MAX_RESOLUTION = RESOLUTIONS[3]; // 140

// ============================================================
// proj4 + OL integráció
// ============================================================
proj4.defs('EPSG:23700', EPSG23700_DEF);
ol.proj.proj4.register(proj4);

const proj23700 = ol.proj.get('EPSG:23700');
proj23700.setExtent(MAP_EXTENT);

// ============================================================
// Tile Grid – bundle WMTS TileMatrixSet: EPSG:23700
// TopLeftCorner:[421306.58134742436,366630.91008161334]
// ============================================================
const tileGrid = new ol.tilegrid.TileGrid({
    extent: MAP_EXTENT,
    resolutions: RESOLUTIONS,
    tileSize: 256
});

// ============================================================
// Alap réteg: OpenStreetMap XYZ (OL automatikusan reprojectálja EPSG:3857 → EPSG:23700)
// ============================================================
const osmBaseLayer = new ol.layer.Tile({
    title: 'OpenStreetMap',
    source: new ol.source.OSM()
});

// ============================================================
// HRSZ réteg – pontosan a bundle EK_HRSZ_POLY konfigja alapján:
//   {...F, title:"Helyrajzi szám", params:{...F.params,
//     maxResolution:b[3].resolution,
//     layer:"iier:EK_HRSZ_POLY",
//     viewparams:`VONEV:${O};TOLDA:${v};IGDAT:${M}`}}
// F.params.url = O = "/api/proxy/iier-gs/wms"
// F.type = "wms", F.format = "image/png"
// v13_ = true  →  VERSION=1.3.0, CRS=EPSG:23700
// ============================================================
const hrszSource = new ol.source.TileWMS({
    url: WMS_URL,
    params: {
        'LAYERS': 'iier:EK_HRSZ_POLY',
        'FORMAT': 'image/png',
        'TRANSPARENT': true,
        'VERSION': '1.3.0',
        'TILED': true,
        'VIEWPARAMS': VIEWPARAMS
    },
    projection: 'EPSG:23700',
    tileGrid: tileGrid,
    serverType: 'geoserver'
});

const hrszLayer = new ol.layer.Tile({
    title: 'Helyrajzi szám (HRSZ)',
    source: hrszSource,
    maxResolution: HRSZ_MAX_RESOLUTION,  // bundle: maxResolution:P[3].resolution = 140
    opacity: 1
});

// ============================================================
// Térkép
// ============================================================
const map = new ol.Map({
    target: 'map',
    layers: [osmBaseLayer, hrszLayer],
    view: new ol.View({
        projection: 'EPSG:23700',
        center: CENTER,         // bundle: center:[2120172,6023409]
        resolutions: RESOLUTIONS,
        resolution: RESOLUTIONS[3],  // alapértelmezett zoom: P[3]=140 → 1:500,000
        extent: MAP_EXTENT,
        constrainResolution: true
    })
});

// ============================================================
// Info panel
// ============================================================
map.on('pointermove', function(evt) {
    const coord = evt.coordinate;
    const res   = map.getView().getResolution();
    const zoom  = RESOLUTIONS.indexOf(res);
    document.getElementById('info').innerHTML =
        `<b>EOV koordináta:</b> Y=${Math.round(coord[0])}, X=${Math.round(coord[1])}<br>` +
        `<b>Felbontás:</b> ${res?.toFixed(3)} m/px (P[${zoom >= 0 ? zoom : '?'}])<br>` +
        `<b>VIEWPARAMS:</b> ${VIEWPARAMS}<br>` +
        `<b>HRSZ látható:</b> ${res <= HRSZ_MAX_RESOLUTION ? '✓ igen' : '✗ nem (zoom be)'}`;
});
</script>
</body>
</html>
